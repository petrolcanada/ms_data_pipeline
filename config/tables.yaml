# Snowflake Table Sync Configuration

# Shared values — define once, reference with *alias
peer_filter: &peer_filter "WHERE _ID IN (SELECT mstarid FROM CIGAM_SBX_PL.DNA_ANALYTICS_INSIGHTS_INVESTMENT_PRODUCT.V_MSTAR_PEERS_FCLASS_ETF_ID_CA_OPENEND)"

# Auto-generated from merge_keys at export time:
#   QUALIFY ROW_NUMBER() OVER (PARTITION BY {merge_keys} ORDER BY {qualify_order_by|_TIMESTAMPTO} DESC) = 1

sf_defaults: &sf_defaults
  database: "CIGAM_PRD_RL"
  schema: "MORNINGSTAR_MAIN"

tables:
  # --- Tables with merge on _ID + _TIMESTAMPFROM ---

  - name: "FUND_SHARE_CLASS_BASIC_INFO_CA_OPENEND"
    sync_mode: "upsert"
    merge_keys: ["_ID", "_TIMESTAMPFROM"]
    watermark_column: "_TIMESTAMPFROM"
    snowflake:
      <<: *sf_defaults
      table: "FUND_SHARE_CLASS_BASIC_INFO_CA_OPENEND"
      filter:
        - *peer_filter
    postgres:
      schema: "ms"
      table: "FUND_SHARE_CLASS_BASIC_INFO_CA_OPENEND"
      indexes:
        - "_ID"
        - "_TIMESTAMPFROM"
        - "_TIMESTAMPTO"

  - name: "FUND_ATTRIBUTES_CA_OPENEND"
    sync_mode: "upsert"
    merge_keys: ["_ID", "_TIMESTAMPFROM"]
    watermark_column: "_TIMESTAMPFROM"
    snowflake:
      <<: *sf_defaults
      table: "FUND_ATTRIBUTES_CA_OPENEND"
      filter:
        - *peer_filter
    postgres:
      schema: "ms"
      table: "FUND_ATTRIBUTES_CA_OPENEND"
      indexes:
        - "_ID"
        - "_TIMESTAMPFROM"
        - "_TIMESTAMPTO"

  - name: "FUND_MANAGER_CA_OPENEND"
    sync_mode: "upsert"
    merge_keys: ["_ID", "_TIMESTAMPFROM"]
    watermark_column: "_TIMESTAMPFROM"
    snowflake:
      <<: *sf_defaults
      table: "FUND_MANAGER_CA_OPENEND"
      filter:
        - *peer_filter
    postgres:
      schema: "ms"
      table: "FUND_MANAGER_CA_OPENEND"
      indexes:
        - "_ID"
        - "_TIMESTAMPFROM"
        - "_TIMESTAMPTO"

  - name: "PROSPECTUS_FEES_CA_OPENEND"
    sync_mode: "upsert"
    merge_keys: ["_ID", "_TIMESTAMPFROM"]
    watermark_column: "_TIMESTAMPFROM"
    snowflake:
      <<: *sf_defaults
      table: "PROSPECTUS_FEES_CA_OPENEND"
      filter:
        - *peer_filter
    postgres:
      schema: "ms"
      table: "PROSPECTUS_FEES_CA_OPENEND"
      indexes:
        - "_ID"
        - "_TIMESTAMPFROM"
        - "_TIMESTAMPTO"

  # --- Tables with dedicated date key ---

  - name: "MONTH_END_TRAILING_TOTAL_RETURNS_CA_OPENEND"
    sync_mode: "upsert"
    merge_keys: ["_ID", "MONTHENDDATE"]
    watermark_column: "_TIMESTAMPFROM"
    snowflake:
      <<: *sf_defaults
      table: "MONTH_END_TRAILING_TOTAL_RETURNS_CA_OPENEND"
      filter:
        - *peer_filter
    postgres:
      schema: "ms"
      table: "MONTH_END_TRAILING_TOTAL_RETURNS_CA_OPENEND"
      indexes:
        - "_ID"
        - "MONTHENDDATE"
        - "_TIMESTAMPFROM"
        - "_TIMESTAMPTO"

  - name: "FUND_FLOW_DETAILS_CA_OPENEND"
    sync_mode: "upsert"
    merge_keys: ["_ID", "ESTFUNDLEVELNETFLOWDATEMOEND"]
    watermark_column: "_TIMESTAMPFROM"
    snowflake:
      <<: *sf_defaults
      table: "FUND_FLOW_DETAILS_CA_OPENEND"
      filter:
        - *peer_filter
    postgres:
      schema: "ms"
      table: "FUND_FLOW_DETAILS_CA_OPENEND"
      indexes:
        - "_ID"
        - "ESTFUNDLEVELNETFLOWDATEMOEND"
        - "_TIMESTAMPFROM"
        - "_TIMESTAMPTO"

  - name: "MORNINGSTAR_RATING_EXTENDED_PERFORMANCE_CA_OPENEND"
    sync_mode: "upsert"
    merge_keys: ["_ID", "RATINGDATE"]
    watermark_column: "_TIMESTAMPFROM"
    snowflake:
      <<: *sf_defaults
      table: "MORNINGSTAR_RATING_EXTENDED_PERFORMANCE_CA_OPENEND"
      filter:
        - *peer_filter
    postgres:
      schema: "ms"
      table: "MORNINGSTAR_RATING_EXTENDED_PERFORMANCE_CA_OPENEND"
      indexes:
        - "_ID"
        - "RATINGDATE"
        - "_TIMESTAMPFROM"
        - "_TIMESTAMPTO"

  - name: "MONTH_END_TRAILING_TOTAL_RETURN_PERCENTILE_AND_ABSOLUTE_RANKS_CA_OPENEND"
    sync_mode: "upsert"
    merge_keys: ["_ID", "MONTHENDDATE"]
    watermark_column: "_TIMESTAMPFROM"
    snowflake:
      <<: *sf_defaults
      table: "MONTH_END_TRAILING_TOTAL_RETURN_PERCENTILE_AND_ABSOLUTE_RANKS_CA_OPENEND"
      filter:
        - *peer_filter
    postgres:
      schema: "ms"
      table: "MONTH_END_TRAILING_TOTAL_RETURN_PERCENTILE_AND_ABSOLUTE_RANKS_CA_OPENEND"
      indexes:
        - "_ID"
        - "MONTHENDDATE"
        - "_TIMESTAMPFROM"
        - "_TIMESTAMPTO"

  - name: "RELATIVE_RISK_MEASURE_PROSPECTUS_CA_OPENEND"
    sync_mode: "upsert"
    merge_keys: ["_ID", "ENDDATE"]
    watermark_column: "_TIMESTAMPFROM"
    snowflake:
      <<: *sf_defaults
      table: "RELATIVE_RISK_MEASURE_PROSPECTUS_CA_OPENEND"
      filter:
        - *peer_filter
        - "QUALIFY ROW_NUMBER() OVER (PARTITION BY _ID, ENDDATE ORDER BY _TIMESTAMPTO DESC) = 1"
    postgres:
      schema: "ms"
      table: "RELATIVE_RISK_MEASURE_PROSPECTUS_CA_OPENEND"
      indexes:
        - "_ID"
        - "ENDDATE"
        - "_TIMESTAMPFROM"
        - "_TIMESTAMPTO"

  - name: "FUND_LEVEL_NET_ASSETS_CA_OPENEND"
    sync_mode: "upsert"
    merge_keys: ["_ID", "NETASSETSDATE"]
    watermark_column: "_TIMESTAMPFROM"
    snowflake:
      <<: *sf_defaults
      table: "FUND_LEVEL_NET_ASSETS_CA_OPENEND"
      source_query: |
        SELECT * EXCLUDE (NETASSETSDATE),
               LAST_DAY(TO_DATE(NETASSETSDATE)) AS NETASSETSDATE
        FROM {table}
        WHERE LAST_DAY(TO_DATE(NETASSETSDATE)) < DATE_TRUNC('month', CURRENT_DATE())
        QUALIFY ROW_NUMBER() OVER (
            PARTITION BY _ID, LAST_DAY(TO_DATE(NETASSETSDATE))
            ORDER BY TO_DATE(NETASSETSDATE) DESC, _TIMESTAMPTO DESC
        ) = 1
      filter:
        - *peer_filter
    postgres:
      schema: "ms"
      table: "FUND_LEVEL_NET_ASSETS_CA_OPENEND"
      indexes:
        - "_ID"
        - "NETASSETSDATE"
        - "_TIMESTAMPFROM"
        - "_TIMESTAMPTO"

  - name: "RISK_MEASURE_CA_OPENEND"
    sync_mode: "upsert"
    merge_keys: ["_ID", "ENDDATE"]
    watermark_column: "_TIMESTAMPFROM"
    snowflake:
      <<: *sf_defaults
      table: "RISK_MEASURE_CA_OPENEND"
      filter:
        - *peer_filter
    postgres:
      schema: "ms"
      table: "RISK_MEASURE_CA_OPENEND"
      indexes:
        - "_ID"
        - "ENDDATE"
        - "_TIMESTAMPFROM"
        - "_TIMESTAMPTO"

  - name: "ANNUAL_REPORT_FEES_CA_OPENEND"
    sync_mode: "upsert"
    merge_keys: ["_ID", "ANNUALREPORTDATE"]
    watermark_column: "_TIMESTAMPFROM"
    snowflake:
      <<: *sf_defaults
      table: "ANNUAL_REPORT_FEES_CA_OPENEND"
      filter:
        - *peer_filter
    postgres:
      schema: "ms"
      table: "ANNUAL_REPORT_FEES_CA_OPENEND"
      indexes:
        - "_ID"
        - "ANNUALREPORTDATE"
        - "_TIMESTAMPFROM"
        - "_TIMESTAMPTO"

  - name: "MORNINGSTAR_RATING_CA_OPENEND"
    sync_mode: "upsert"
    merge_keys: ["_ID", "RATINGDATE"]
    watermark_column: "_TIMESTAMPFROM"
    snowflake:
      <<: *sf_defaults
      table: "MORNINGSTAR_RATING_CA_OPENEND"
      filter:
        - *peer_filter
        - "QUALIFY ROW_NUMBER() OVER (PARTITION BY _ID, RATINGDATE ORDER BY _TIMESTAMPTO DESC) = 1"
    postgres:
      schema: "ms"
      table: "MORNINGSTAR_RATING_CA_OPENEND"
      indexes:
        - "_ID"
        - "RATINGDATE"
        - "_TIMESTAMPFROM"
        - "_TIMESTAMPTO"

  - name: "FEE_LEVELS_CA_OPENEND"
    sync_mode: "upsert"
    merge_keys: ["_ID", "FEELEVELDATE"]
    watermark_column: "_TIMESTAMPFROM"
    snowflake:
      <<: *sf_defaults
      table: "FEE_LEVELS_CA_OPENEND"
      filter:
        - *peer_filter
    postgres:
      schema: "ms"
      table: "FEE_LEVELS_CA_OPENEND"
      indexes:
        - "_ID"
        - "FEELEVELDATE"
        - "_TIMESTAMPFROM"
        - "_TIMESTAMPTO"
